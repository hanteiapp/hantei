<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="description" content="今日の野球の試合を選んで、気になった判定に声を届けるHANTEI。">
  <meta name="theme-color" content="#071328">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="HANTEI">
  <title>HANTEI | 試合一覧</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="home-shell">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="HANTEI トップページ">
        <span>HANTEI</span>
        <small>みんなのABS</small>
      </a>
    </header>

    <section aria-labelledby="games-heading">
      <div class="section-heading">
        <div>
          <p class="eyebrow">GAME SCHEDULE</p>
          <h1 id="games-heading">試合一覧</h1>
        </div>
        <span id="game-count" class="game-count">0試合</span>
      </div>
      <div class="date-nav" aria-label="試合日を選択">
        <button id="previous-date" type="button">← 前日</button>
        <time id="selected-date"></time>
        <div class="date-forward">
          <button id="today-date" type="button" hidden>本日</button>
          <button id="next-date" type="button" hidden>翌日 →</button>
        </div>
      </div>
      <div id="game-list" class="game-grid"></div>
      <p id="game-empty" class="empty-message" hidden></p>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
