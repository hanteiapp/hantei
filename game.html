<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="description" content="試合中の気になった一球をABSで確認してほしいと伝えるHANTEI。">
  <meta name="theme-color" content="#071328">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="HANTEI">
  <title>試合 | HANTEI</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="app-icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="app-icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <header class="game-header">
      <a class="back-link" href="index.html" aria-label="試合一覧へ戻る">← 試合一覧</a>
      <a class="brand brand-compact" href="index.html">
        <img src="app-icon-192.png" alt="" width="26" height="26">
        <span>HANTEI</span>
      </a>
    </header>

    <section id="game-view" hidden>
      <div class="match-card">
        <div class="match-info">
          <div class="matchup">
            <strong id="visitor-name"></strong>
            <span>対</span>
            <strong id="home-name"></strong>
          </div>
          <p id="game-time" class="match-time"></p>
          <p id="game-umpire" class="match-umpire" hidden></p>
        </div>
        <div id="surge-notice" class="surge-notice" aria-live="polite" hidden>
          <strong>ABS反応が急増しています</strong>
          <span>この試合の判定に注目が集まっています</span>
        </div>
      </div>

      <div class="action-area">
        <p>気になった判定に、ファンの声を。</p>
        <div class="action-buttons">
          <button id="abs-button" class="abs-button reaction-button" type="button" aria-describedby="abs-availability">
            <strong>ファンABSチャレンジ</strong>
            <span>ボール・ストライク判定</span>
          </button>
          <div id="abs-confirmation" class="abs-confirmation" aria-live="polite" hidden>
            <p><strong>ファンABSチャレンジを送信しました。</strong><span>詳細を入力しますか？</span></p>
            <div>
              <button id="open-details" type="button">はい</button>
              <button id="skip-details" type="button">いいえ</button>
            </div>
          </div>
          <button id="request-button" class="abs-button reaction-button" type="button" aria-describedby="abs-availability">
            <strong>ファンリクエスト</strong>
            <span>アウト／セーフ、フェア／ファウルなど</span>
          </button>
        </div>
        <p id="abs-availability" class="abs-availability" hidden>試合開始後よりご利用いただけます。</p>
      </div>

      <section class="reaction-history" aria-labelledby="history-heading">
        <div class="history-heading">
          <h1 id="history-heading">みんなのABS指数</h1>
          <span>この試合</span>
        </div>
        <p id="history-empty">急増した判定はまだありません</p>
        <ol id="surge-history" hidden></ol>
      </section>
    </section>

    <p id="game-error" class="game-error" hidden>試合が見つかりませんでした。</p>
  </main>

  <dialog id="details-dialog" class="details-dialog" aria-labelledby="details-title">
    <form id="details-form" method="dialog">
      <div class="sheet-handle" aria-hidden="true"></div>
      <div class="sheet-heading">
        <div>
          <p class="eyebrow">OPTIONAL</p>
          <h2 id="details-title">判定の詳細</h2>
        </div>
        <button id="close-dialog" class="close-button" type="button" aria-label="詳細入力画面を閉じる">×</button>
      </div>

      <div class="detail-row">
        <span id="offense-team-label" class="detail-label">攻撃チーム</span>
        <div class="offense-options" role="group" aria-labelledby="offense-team-label">
          <label class="visitor-choice">
            <input id="offense-visitor" type="radio" name="offenseTeamCode">
            <span id="offense-visitor-name"></span>
          </label>
          <label class="home-choice">
            <input id="offense-home" type="radio" name="offenseTeamCode">
            <span id="offense-home-name"></span>
          </label>
        </div>
      </div>

      <div class="detail-row">
        <label for="batter-name">打者名</label>
        <div class="player-field">
          <input id="batter-name" name="batterName" type="text" placeholder="選手名・背番号を入力" autocomplete="off" role="combobox" aria-autocomplete="list" aria-controls="batter-suggestions" aria-expanded="false">
          <button id="clear-batter" class="clear-player" type="button" aria-label="入力した打者名を消す" hidden>×</button>
          <div id="batter-suggestions" class="player-suggestions" role="listbox" hidden></div>
        </div>
      </div>

      <div class="detail-row">
        <label for="pitcher-name">投手名</label>
        <div class="player-field">
          <input id="pitcher-name" name="pitcherName" type="text" placeholder="選手名・背番号を入力" autocomplete="off" role="combobox" aria-autocomplete="list" aria-controls="pitcher-suggestions" aria-expanded="false">
          <button id="clear-pitcher" class="clear-player" type="button" aria-label="入力した投手名を消す" hidden>×</button>
          <div id="pitcher-suggestions" class="player-suggestions" role="listbox" hidden></div>
        </div>
      </div>

      <div class="detail-row">
        <label for="pitch-number">何球目</label>
        <select id="pitch-number" name="pitchNumber">
          <option value="">選択してください</option>
          <option value="1">1球目</option>
          <option value="2">2球目</option>
          <option value="3">3球目</option>
          <option value="4">4球目</option>
          <option value="5">5球目</option>
          <option value="6">6球目</option>
          <option value="7+">7球目以上</option>
        </select>
      </div>

      <div class="detail-row">
        <span id="pitch-course-label" class="detail-label">投球コース</span>
        <div class="choice-row three-options" role="group" aria-labelledby="pitch-course-label">
          <label><input type="radio" name="pitchCourse" value="inside"><span>内角</span></label>
          <label><input type="radio" name="pitchCourse" value="middle"><span>中央</span></label>
          <label><input type="radio" name="pitchCourse" value="outside"><span>外角</span></label>
        </div>
      </div>

      <div class="detail-row">
        <span id="pitch-height-label" class="detail-label">投球の高さ</span>
        <div class="choice-row three-options" role="group" aria-labelledby="pitch-height-label">
          <label><input type="radio" name="pitchHeight" value="high"><span>高め</span></label>
          <label><input type="radio" name="pitchHeight" value="middle"><span>中央</span></label>
          <label><input type="radio" name="pitchHeight" value="low"><span>低め</span></label>
        </div>
      </div>

      <div class="detail-row">
        <span id="official-call-label" class="detail-label">実際の判定</span>
        <div class="choice-row" role="group" aria-labelledby="official-call-label">
          <label><input type="radio" name="officialCall" value="strike"><span>ストライク</span></label>
          <label><input type="radio" name="officialCall" value="ball"><span>ボール</span></label>
        </div>
      </div>

      <div class="detail-row">
        <span id="fan-call-label" class="detail-label">正しいと思う判定</span>
        <output id="fan-call-output" class="auto-call" aria-labelledby="fan-call-label">実際の判定を選択</output>
        <input id="fan-call" name="fanCall" type="hidden">
      </div>

      <button class="submit-button" type="submit">詳細を送信</button>
    </form>
  </dialog>
  <script src="app.js"></script>
</body>
</html>
